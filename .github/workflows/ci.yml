name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: CGO_ENABLED=1 go build ./...
      - name: Vet
        run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage report
        run: go tool cover -func=coverage.out

  integration-docker:
    runs-on: ubuntu-latest
    needs: [build, test]
    services:
      docker:
        image: docker:dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Verify Docker
        run: docker version && docker compose version
      - name: Run deploy integration tests
        run: go test -v -tags=integration -run TestIntegration ./internal/deploy/...
        env:
          FLEETDECK_INTEGRATION: "true"

  integration-ssh:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Start SSH server
        run: |
          ssh-keygen -t ed25519 -f /tmp/testkey -N '' -q
          docker run -d --name sshd \
            -p 2222:22 \
            -e SSH_ENABLE_ROOT=true \
            -e AUTHORIZED_KEYS="$(cat /tmp/testkey.pub)" \
            linuxserver/openssh-server:latest
          # Wait for SSH to be ready
          for i in $(seq 1 30); do
            if ssh-keyscan -p 2222 localhost 2>/dev/null | grep -q ssh; then
              break
            fi
            sleep 1
          done
      - name: Run SSH integration tests
        run: go test -v -tags=integration -run TestIntegration ./internal/remote/...
        env:
          FLEETDECK_INTEGRATION: "true"
          SSH_TEST_HOST: localhost
          SSH_TEST_PORT: "2222"
          SSH_TEST_USER: root
          SSH_TEST_KEY: /tmp/testkey
