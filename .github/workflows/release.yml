name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run tests
        run: go test -race ./...

      - name: Build raw binaries for upgrade command
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X github.com/fleetdeck/fleetdeck/cmd.Version=${GITHUB_REF_NAME#v}" \
            -o dist/fleetdeck-linux-amd64 .
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X github.com/fleetdeck/fleetdeck/cmd.Version=${GITHUB_REF_NAME#v}" \
            -o dist/fleetdeck-linux-arm64 .

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
